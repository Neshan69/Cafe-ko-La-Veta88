<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="menu.css">
</head>
<body>

<section class="menu-section">
  <div class="menu-inner">

    <header class="menu-header">
      <span class="menu-eyebrow">Crafted with love</span>
      <h2 class="menu-title">Our <em>Menu</em></h2>
      <div class="menu-divider">
        <span></span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
        <span></span>
      </div>
    </header>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">All Items</button>
      <button class="filter-btn" data-filter="coffee">Coffee</button>
      <button class="filter-btn" data-filter="tea">Tea &amp; More</button>
      <button class="filter-btn" data-filter="pastry">Pastries</button>
      <button class="filter-btn" data-filter="food">Bites</button>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

  </div>
</section>
<script src="menu.js" defer></script>

</body>
</html>
