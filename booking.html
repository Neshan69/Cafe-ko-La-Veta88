<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La-Veta88 Booking</title>
  <link rel="stylesheet" href="booking.css">
</head>

<body>

<nav>
  <h2>La-Veta88 ☕</h2>
  <button
    onclick="window.location.href='index.html';"
    style="
      background:#333;
      color:#fff;
      padding:2px 6px 2px 5px;
      border:none;
      border-radius:4px;
      cursor:pointer;
      font-size:0.86rem;
      display:inline-flex;
      align-items:center;
      gap:3px;
      height:24px;
      min-width:24px;
      width:auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.13), 0 0.5px 2px rgba(0,0,0,0.11);
      transition:background 0.2s;
    ">
    <span style="font-size:1em;margin-right:1px;">&#8592;</span>
    <span style="font-size:0.93em;">Home</span>
  </button>
</nav>

<div class="booking">
  <h1>Reserve Table</h1>

  <form id="bookingForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>

    <!-- Guests (max 8) -->
    <input type="number" id="guests" placeholder="Guests" min="1" max="8" required>

    <!-- Table Types (updated to 8) -->
    <select id="tableType" required>
      <option value="">Select Table</option>
      <option value="2">2 Seat</option>
      <option value="4">4 Seat</option>
      <option value="6">6 Seat</option>
      <option value="8">8 Seat</option>
    </select>

    <input type="date" id="date" required>
    <input type="time" id="time" required>

    <button type="submit">Book Now</button>
  </form>
</div>

<!-- Admin Panel -->
<div class="admin">
  <h2>📋 Booking Records</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Guests</th>
        <th>Table</th>
        <th>Date</th>
        <th>Time</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="bookingList"></tbody>
  </table>
</div>

<script src="booking.js"></script>
</body>
</html>
