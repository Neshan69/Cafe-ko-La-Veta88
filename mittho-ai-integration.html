<!--
  ============================================================
  MITTHO-AI — HTML Integration Snippet
  La-Veta88 · mittho.ai Floating Chat Widget
  ============================================================

  HOW TO INTEGRATE INTO index.html
  ─────────────────────────────────────────────────────────
  STEP 1 — In <head>, add the CSS (after your index.css):

    <link rel="stylesheet" href="mittho-ai.css">

  STEP 2 — In <body>, replace the empty .mittho-ai section
  with this snippet (the widget injects itself into <body>
  automatically via JS — you only need the section as an
  anchor/scroll target):

    <!-- Mittho AI anchor (widget is injected by JS) -->
    <section class="mittho-ai" id="mittho-ai-section"></section>

  STEP 3 — Before </body>, add the JS (after your other scripts):

    <script src="mittho-ai.js"></script>

  ─────────────────────────────────────────────────────────
  FULL EXAMPLE — what your index.html should look like:
  ============================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La-Veta88.com</title>

  <!-- ... your existing links ... -->

  <!-- ① ADD THIS — Mittho AI styles (after index.css) -->
  <link rel="stylesheet" href="mittho-ai.css">

</head>
<body>

  <!-- ... all your existing HTML (header, main, sections, footer) ... -->

  <!--
    ② REPLACE the empty <section class="mittho-ai"> in your contact section
    Your current code:
      <section class="mittho-ai"></section>

    Replace with:
  -->
  <section class="mittho-ai" id="mittho-ai-section" aria-label="Mittho AI Chat Widget"></section>

  <!-- ... footer ... -->

  <!-- ... your existing scripts ... -->

  <!-- ③ ADD THIS — Mittho AI script (last, before </body>) -->
  <script src="mittho-ai.js"></script>

</body>
</html>
