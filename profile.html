<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Your Account - Kanchhi ko Bhatti कान्छीको भट्टी</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Preloader -->
  <div class="preloader" id="preloader">
    <div class="preloader-spinner"></div>
  </div>

  <main>
    <div class="profile-container">
      <h2>Create Your Account</h2>
      <form class="profile-form" id="profile-form" autocomplete="on">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Eg: Jamie Roberts">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="Eg: your@email.com" autocomplete="email">

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required placeholder="Eg: +1 555 234 6789" pattern="[\d\+\s\-]+" autocomplete="tel">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" placeholder="Choose a strong password" autocomplete="new-password">

        <button type="submit">Create Account</button>
        <div class="form-hint">
          Already have an account?
          <a href="login.html" style="color: var(--primary); text-decoration: underline;">Log In</a>
        </div>
        <div class="success-message" id="success-message">Your details have been submitted!</div>
        <div class="error-message" id="error-message">Sorry, there was a problem sending your details.</div>
      </form>
    </div>
  </main>
  <script src="profile.js" defer></script>
</body>
</html>
